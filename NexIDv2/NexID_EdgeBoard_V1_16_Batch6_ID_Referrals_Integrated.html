function showView(v){state.view=v;document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));$(v)?.classList.add('active');document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));if(v==='home')renderHome();if(v==='narratives')renderNarratives();if(v==='boards')renderBoards();if(v==='receipts')renderReceipts();if(v==='points')renderPoints();if(v==='mint')renderMint();if(v==='dashboard')renderDashboard();if(v==='legal')renderLegal();renderBottom();window.scrollTo({top:0,behavior:'smooth'})}

c-metric"><span>Side</span><b>Fade</b></div></div></div><div class="small-stack"><div class="small-card"><h3>Receipts, not talk.</h3><p>Every filled position can become a card, rank movement and reputation event.</p><button class="btn" onclick="showView('boards')">Open EdgeBoards</button></div><div class="small-card"><h3>Own the history.</h3><p>.id turns receipts, board identity and referrals into one portable edge profile.</p><button class="primary" onclick="showView('mint')">Mint .id</button></div></div></section>`}
function marketTable(title='Live Narratives',withHead=false){return `<section class="section"><div class="section-head"><div><div class="eyebrow"><i class="dot"></i>${title}</div><h2>${withHead?'What CT is riding and fading right now.':'Live narratives'}</h2><p>${withHead?'Pick a side from the board or open a narrative for depth, comments, rules and receipts.':''}</p></div><button class="btn" onclick="showView('boards')">Open EdgeBoards</button></div><div class="market-table"><div class="table-head"><span>Narrative</span><span>Heat</span><span>7D</span><span>Riders</span><span>Faders</span><span>Liquidity</span><span></span></div>${narratives.map(n=>`<div class="market-row" onclick="openDetail('${n.id}')"><div class="market-name"><div class="orb">${n.name.split(' ').map(x=>x[0]).slice(0,2).join('')}</div><div><b>${n.name}</b><span>${n.summary}</span></div></div><div class="metric"><b>${n.heat}</b><span>Heat</span></div><div class="metric"><b class="move ${n.move>=0?'up':'down'}">${n.move>0?'+':''}${n.move}%</b><span>7D</span></div><div class="metric"><b>${n.riders.toLocaleString()}</b><span>Riders</span></div><div class="metric"><b>${n.faders.toLocaleString()}</b><span>Faders</span></div><div class="metric"><b>${fmt(n.liq)}</b><span>${n.spread}% spread</span></div><div class="row-actions"><button class="mini-btn ride" onclick="event.stopPropagation();openDetail('${n.id}','ride')">Ride</button><button class="mini-btn fade" onclick="event.stopPropagation();openDetail('${n.id}','fade')">Fade</button></div></div>`).join('')}</div></section>`}
function renderNarratives(){$('narratives').innerHTML=marketTable('Live Narratives',true)}
function openDetail(id,side){state.selected=narratives.find(n=>n.id===id)||narratives[0]; if(side)state.side=side; state.limitPrice=state.side==='ride'?state.selected.ridePrice:state.selected.fadePrice; state.tab='activity'; showView('detail'); renderDetail();}
function renderDetail(){const n=state.selected; $('detail').innerHTML=`<div class="detail-head"><div class="detail-title"><div class="backline"><button onclick="showView('narratives')">← Narratives</button><span class="eyebrow"><i class="dot"></i>${n.tag}</span></div><h1>${n.name}</h1><p>${n.summary}</p><div class="stat-grid"><div class="statbox"><b>${n.heat}</b><span>Heat</span></div><div class="statbox"><b class="move ${n.move>=0?'up':'down'}">${n.move>0?'+':''}${n.move}%</b><span>7D move</span></div><div class="statbox"><b>${fmt(n.liq)}</b><span>Liquidity</span></div><div class="statbox"><b>${n.spread}%</b><span>Spread</span></div><div class="statbox"><b>${fmt(n.vol)}</b><span>Volume</span></div><div class="statbox"><b>${n.expiry}</b><span>Expires</span></div></div></div><aside class="detail-side"><h3>Board split</h3><div class="side-split"><div class="split"><span>Riders</span><b>${n.riders.toLocaleString()}</b></div><div class="split"><span>Faders</span><b>${n.faders.toLocaleString()}</b></div></div><div class="rider-fader"><i style="width:${Math.round(n.riders/(n.riders+n.faders)*100)}%"></i></div><div class="balance-row"><span>Top receipt</span><b>${n.top}</b></div><div class="balance-row"><span>Market quality</span><b>${n.quality}</b></div><div class="balance-row"><span>Active side</span><b>${state.side==='ride'?'Ride':'Fade'}</b></div></aside></div><div class="detail-grid"><div class="market-body"><div class="chart-panel"><div class="chart-top"><h3>${state.chart==='price'?'Price movement':'Narrative heat'}</h3><div class="chart-tabs"><button class="${state.chart==='price'?'active':''}" onclick="state.chart='price';renderDetail()">Price</button><button class="${state.chart==='heat'?'active':''}" onclick="state.chart='heat';renderDetail()">Heat</button></div></div><div class="chart" id="chartBox"></div><div class="depth-grid"><div class="depth-side"><h4>Ride depth</h4>${[0.39,0.40,0.41,0.42].map((p,i)=>`<div class="depth-row"><span>${(p*100).toFixed(0)}¢</span><b>$${[18,42,66,91][i]}k</b></div>`).join('')}</div><div class="depth-side"><h4>Fade depth</h4>${[0.60,0.61,0.62,0.63].map((p,i)=>`<div class="depth-row"><span>${(p*100).toFixed(0)}¢</span><b>$${[21,37,84,112][i]}k</b></div>`).join('')}</div></div></div><div class="social-panel"><div class="tabs"><button class="${state.tab==='activity'?'active':''}" onclick="state.tab='activity';renderDetailPanel()">Activity</button><button class="${state.tab==='comments'?'active':''}" onclick="state.tab='comments';renderDetailPanel()">Comments</button><button class="${state.tab==='receipts'?'active':''}" onclick="state.tab='receipts';renderDetailPanel()">Receipts</button><button class="${state.tab==='rules'?'active':''}" onclick="state.tab='rules';renderDetailPanel()">Rules</button></div><div class="panel-content" id="detailPanel"></div></div></div>${ticket()}</div>`; renderChart(); renderDetailPanel(); renderBottom();}
function renderChart(){const box=$('chartBox'); if(!box)return; const n=state.selected; const data=state.chart==='heat'?n.chart:n.chart.map((x,i)=>Math.max(18,Math.round((x*.55)+(i*2.2)))); const w=900,h=354,pad=24; const min=Math.min(...data)-4,max=Math.max(...data)+4; const pts=data.map((v,i)=>[pad+i*(w-2*pad)/(data.length-1), h-pad-(v-min)/(max-min)*(h-2*pad)]); const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' '); const area=d+` L ${w-pad} ${h-pad} L ${pad} ${h-pad} Z`; box.innerHTML=`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><defs><linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffb000" stop-opacity=".24"/><stop offset="1" stop-color="#ffb000" stop-opacity="0"/></linearGradient></defs>${[.25,.5,.75].map(y=>`<line class="gridline" x1="${pad}" x2="${w-pad}" y1="${h*y}" y2="${h*y}"/>`).join('')}<path class="area" d="${area}"/><path class="line" d="${d}"/>${pts.map((p,i)=>`<circle class="chart-point" id="pt${i}" cx="${p[0]}" cy="${p[1]}" r="5"/>`).join('')}</svg><div class="crosshair" id="crosshair"></div><div class="chart-tip" id="chartTip"></div>`; box.onmousemove=e=>{const rect=box.getBoundingClientRect(); const x=e.clientX-rect.left; const idx=Math.max(0,Math.min(data.length-1,Math.round(x/rect.width*(data.length-1)))); const px=pts[idx][0]/w*rect.width; const py=pts[idx][1]/h*rect.height; document.querySelectorAll('.chart-point').forEach(p=>p.classList.remove('active')); const pt=$('pt'+idx); if(pt)pt.classList.add('active'); const ch=$('crosshair'),tip=$('chartTip'); ch.style.left=px+'px'; ch.style.opacity=1; tip.style.left=px+'px'; tip.style.top=py+'px'; tip.style.opacity=1; tip.innerHTML=`<b>${state.chart==='heat'?data[idx]+' heat':(data[idx])+'¢'}</b><span>${idx+1}h ago · ${n.name}</span>`}; box.onmouseleave=()=>{const ch=$('crosshair'),tip=$('chartTip'); if(ch)ch.style.opacity=0;if(tip)tip.style.opacity=0;document.querySelectorAll('.chart-point').forEach(p=>p.classList.remove('active'));}}

function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function identityLabel(){return state.idName?state.idName+'.id':'alice'}
function publicUrl(kind,id){return `https://nexid.xyz/${kind}/${id}`}
function latestPosition(){return state.positions[0]||null}
function latestReceipt(){return state.receipts[0]||null}
function proofLevel(type,payload){if(type==='receipt')return state.idName?'.id Verified':'Verified'; if(type==='position')return 'Tracked'; if(type==='board')return 'Board Snapshot'; if(type==='passport')return '.id Active'; if(type==='points')return 'Season Points'; return 'Public'}
function positionCardMeta(pos){const n=narratives.find(x=>x.name===pos.n)||state.selected; const title=`${identityLabel()} is ${pos.side==='ride'?'riding':'fading'} ${pos.n}`; return {type:'Position Card',title,big:pos.side==='ride'?'RIDE':'FADE',sub:`Entry ${Math.round(pos.entry*100)}¢ · $${pos.amount} size · ${n.heat} heat`,identity:identityLabel(),accent:pos.side==='ride'?'#16c784':'#ff5c72',metrics:[['Entry',Math.round(pos.entry*100)+'¢'],['Size','$'+pos.amount],['Heat',String(n.heat)],['Status','Live']],url:publicUrl('position',pos.id),proof:proofLevel('position',pos),footer:state.idName?`Join via ${referralLink()}`:'Claim this edge with .id'} }
function receiptCardMeta(r){return {type:'Receipt Card',title:`${r.identity} ${r.side==='ride'?'rode':'faded'} ${r.narrative}`,big:r.result,sub:`${r.copy} · ${r.points} Edge Points`,identity:r.identity,accent:'#ffb000',metrics:[['Rank',r.rank],['Heat',r.heatMove],['Points','+'+r.points],['Proof',r.proof]],url:r.url,proof:r.proof,footer:state.idName?`Join via ${referralLink()}`:'Generated by NexID'} }
function boardCardMeta(){const rows=boardData[state.board]||boardData.faders; const labels={faders:'Top Faders',riders:'Top Riders',receipts:'Best Receipts',lowcap:'Low-Capital Signal',global:'Global Points'}; const label=labels[state.board]||'Top Faders'; return {type:'Board Snapshot',title:label,big:rows[0][0],sub:`${rows[0][1]} · ${rows[0][2]} leading`,identity:'NexID EdgeBoard',accent:'#ffb000',metrics:[[rows[0][4],rows[0][0]],[rows[1][4],rows[1][0]],[rows[2][4],rows[2][0]],['Season','Live']],url:publicUrl('boards',state.board),proof:proofLevel('board'),footer:'Trade the timeline. Prove your edge.'}}
function passportCardMeta(){const id=state.idName||'yourname';return {type:'.id Passport Card',title:`${id}.id`,big:'EDGE',sub:'Portable edge passport for receipts, boards, referrals and future NexID access.',identity:`${id}.id`,accent:'#ffb000',metrics:[['Status','Active'],['Referral','25%'],['Points','+'+state.points.toLocaleString()],['Cards','Verified']],url:publicUrl('id',id),proof:proofLevel('passport'),footer:referralLink(id)}}
function pointsCardMeta(){return {type:'Global Points Card',title:`${identityLabel()} on Season 1`,big:state.points.toLocaleString(),sub:'Edge Points from positions, receipts, board movement and referrals.',identity:identityLabel(),accent:'#ffb000',metrics:[['Rank','#184'],['Positions',String(state.positions.length||0)],['Receipts',String(state.receipts.length||0)],['Season','Live']],url:publicUrl('points',identityLabel().replace('.id','')),proof:proofLevel('points'),footer:'Flex them while the season is live.'}}
function cardSVG(meta){const m=meta.metrics||[]; const accent=meta.accent||'#ffb000'; const metricSvg=m.slice(0,4).map((x,i)=>`<g transform="translate(${70+i*265},525)"><rect width="235" height="80" rx="22" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.11)"/><text x="20" y="30" fill="#948b7c" font-size="17" font-weight="800" letter-spacing="1.4">${esc(x[0]).toUpperCase()}</text><text x="20" y="61" fill="#fff8e8" font-size="27" font-weight="900">${esc(x[1])}</text></g>`).join(''); return `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><defs><radialGradient id="g" cx="78%" cy="22%" r="68%"><stop offset="0" stop-color="${accent}" stop-opacity=".42"/><stop offset=".38" stop-color="${accent}" stop-opacity=".16"/><stop offset="1" stop-color="#080706" stop-opacity="0"/></radialGradient><linearGradient id="b" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#080706"/><stop offset=".62" stop-color="#15110b"/><stop offset="1" stop-color="#2b1d08"/></linearGradient></defs><rect width="1200" height="675" rx="42" fill="url(#b)"/><rect width="1200" height="675" rx="42" fill="url(#g)"/><rect x="34" y="34" width="1132" height="607" rx="34" fill="none" stroke="rgba(255,176,0,.24)"/><text x="70" y="88" fill="#ffcf73" font-size="19" font-weight="900" letter-spacing="2.6">${esc(meta.type).toUpperCase()}</text><text x="70" y="142" fill="#fff8e8" font-size="40" font-weight="900">${esc(meta.identity)}</text><text x="70" y="338" fill="#ffffff" font-size="118" font-weight="950" letter-spacing="-8">${esc(meta.big)}</text><text x="72" y="405" fill="#d8ceb9" font-size="38" font-weight="900">${esc(meta.title)}</text><foreignObject x="72" y="426" width="820" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Arial,sans-serif;color:#a99f91;font-size:23px;line-height:1.25;font-weight:650">${esc(meta.sub)}</div></foreignObject>${metricSvg}<text x="70" y="632" fill="#83796b" font-size="18" font-weight="800">${esc(meta.footer||'Generated by NexID')}</text><text x="1030" y="632" text-anchor="end" fill="#83796b" font-size="18" font-weight="800">${esc(meta.proof)}</text><circle cx="1087" cy="91" r="34" fill="rgba(255,176,0,.14)" stroke="rgba(255,176,0,.36)"/><path d="M1087 63c16 0 28 12 28 28 0 20-28 40-28 40s-28-20-28-40c0-16 12-28 28-28Z" fill="none" stroke="#ffb000" stroke-width="5"/><path d="M1087 79v38M1072 91h30" stroke="#fff" stroke-width="5" stroke-linecap="round"/></svg>`}
function metaFor(type,payload){if(type==='position')return positionCardMeta(payload||latestPosition()); if(type==='receipt')return receiptCardMeta(payload||latestReceipt()); if(type==='board')return boardCardMeta(); if(type==='passport')return passportCardMeta(); if(type==='points')return pointsCardMeta(); return pointsCardMeta()}
function openCard(type,payload){const meta=metaFor(type,payload); if(!meta){toast('No card available yet');return} state.currentCard=meta; $('cardModalTitle').textContent=meta.type; $('cardModalSub').textContent=meta.title; $('cardProof').textContent=meta.proof; $('cardMetaLine').textContent=meta.url; $('cardPreview').innerHTML=cardSVG(meta); $('cardModal').classList.add('show')}
function closeCardModal(){ $('cardModal').classList.remove('show')}
function copyCardLink(){const url=state.currentCard?.url||'https://nexid.xyz'; navigator.clipboard?.writeText(url); toast('Card link copied')}
function shareCardLink(){const meta=state.currentCard;if(!meta)return; if(navigator.share)navigator.share({title:meta.title,text:meta.sub,url:meta.url}).catch(()=>{}); else copyCardLink()}
function downloadCardPNG(){const meta=state.currentCard;if(!meta)return; const svg=cardSVG(meta); const blob=new Blob([svg],{type:'image/svg+xml;charset=utf-8'}); const url=URL.createObjectURL(blob); const img=new Image(); img.onload=()=>{const canvas=document.createElement('canvas');canvas.width=1200;canvas.height=675;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0);URL.revokeObjectURL(url);const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=(meta.type+'-'+meta.identity).toLowerCase().replace(/[^a-z0-9]+/g,'-')+'.png';a.click();toast('PNG downloaded')}; img.src=url}
function makeReceipt(pos){if(!pos)return null; const n=narratives.find(x=>x.name===pos.n)||state.selected; const existing=state.receipts.find(r=>r.positionId===pos.id); if(existing)return existing; const gain=pos.side==='ride'?Math.max(21,Math.round(n.move+28)):Math.max(18,Math.round((100-n.heat)/2+48)); const r={id:'rcpt_'+pos.id,positionId:pos.id,identity:identityLabel(),narrative:pos.n,side:pos.side,result:'+'+gain+'%',copy:`${pos.side==='ride'?'Rode':'Faded'} ${pos.n} with ${n.heat} heat at entry`,points:420,rank:pos.side==='ride'?'#7':'#3',heatMove:pos.side==='ride'?`${n.heat}→${Math.min(99,n.heat+9)}`:`${n.heat}→${Math.max(30,n.heat-34)}`,proof:state.idName?'.id Verified':'Verified',url:publicUrl('receipt','rcpt_'+pos.id)}; state.receipts.unshift(r); state.points+=420;localStorage.setItem('nexid_points',state.points);return r}
function generateReceipt(positionId){const pos=state.positions.find(p=>p.id===positionId)||latestPosition(); if(!pos){toast('Place a position first');return} const r=makeReceipt(pos); toast('Receipt generated · +420 Edge Points'); renderDetailPanel(); renderDashboard(false); renderPoints(); openCard('receipt',r)}

function renderDetailPanel(){const el=$('detailPanel'); if(!el)return; const n=state.selected; const related=state.positions.filter(p=>p.n===n.name); const receipts=state.receipts.filter(r=>r.narrative===n.name); if(state.tab==='activity') el.innerHTML=`<div class="feed">${related.map(p=>`<div class="feed-item"><div class="feed-head"><b>You ${p.side==='ride'?'rode':'faded'} at ${Math.round(p.entry*100)}¢</b><span class="tag ${p.side==='ride'?'rider':'fader'}">${p.side}</span></div><p>${p.label}</p><div class="inline-actions"><button class="btn" onclick="openCard('position',state.positions.find(x=>x.id===${p.id}))">Position card</button><button class="primary" onclick="generateReceipt(${p.id})">Generate receipt</button></div></div>`).join('')}<div class="feed-item"><div class="feed-head"><b>maya.id faded at ${(n.fadePrice*100).toFixed(0)}¢</b><span class="tag fader">Fader</span></div><p>Position live. Receipt eligible at outcome.</p></div><div class="feed-item"><div class="feed-head"><b>sam.id rode at ${(n.ridePrice*100).toFixed(0)}¢</b><span class="tag rider">Rider</span></div><p>Moved 9 spots on the ${n.name} board.</p></div><div class="feed-item"><div class="feed-head"><b>degen.id generated a receipt</b><span>+420 pts</span></div><p>${n.top} best receipt on this board.</p></div></div>`;
 if(state.tab==='comments') el.innerHTML=`<div class="feed">${n.comments.map((c,i)=>`<div class="feed-item"><div class="feed-head"><b>${['maya.id','0xRafi','sana.id'][i]}</b><span class="tag ${i===1?'rider':'fader'}">${i===1?'Rider':'Fader'}</span></div><p>${c}</p></div>`).join('')}<div class="feed-item"><div class="feed-head"><b>You</b><span>${state.side==='ride'?'Rider':'Fader'}</span></div><p>${related.length?'Your position is live on this narrative.':'Place a position to comment with status.'}</p></div></div>`;
 if(state.tab==='receipts') el.innerHTML=`<div class="receipt-strip"><div class="mini-receipt"><b>${n.top}</b><span>Best receipt · ${n.name}</span></div><div class="mini-receipt"><b>#3</b><span>Top ${state.side==='ride'?'Riders':'Faders'} this week</span></div><div class="mini-receipt"><b>+420</b><span>Largest points boost</span></div></div><div class="receipt-mini-list">${related.map(p=>`<div class="receipt-mini-row"><div><b>${p.side==='ride'?'Ride':'Fade'} position · ${Math.round(p.entry*100)}¢</b><span>${p.proof} · card and receipt ready</span></div><div class="inline-actions"><button class="btn" onclick="openCard('position',state.positions.find(x=>x.id===${p.id}))">Position card</button><button class="primary" onclick="generateReceipt(${p.id})">Receipt</button></div></div>`).join('')}${receipts.map(r=>`<div class="receipt-mini-row"><div><b>${r.result} · ${r.identity}</b><span>${r.proof} · ${r.url}</span></div><button class="btn" onclick="openCard('receipt',state.receipts.find(x=>x.id==='${r.id}'))">Open card</button></div>`).join('')}</div>`;
 if(state.tab==='rules') el.innerHTML=`<div class="feed">${n.rules.map((r,i)=>`<div class="rule"><div class="num">${i+1}</div><div><b>${['Outcome','Receipts','Quality'][i]||'Rule'}</b><span>${r}</span></div></div>`).join('')}</div>`;}
function ticket(){return `<aside class="ticket"><h3>${state.side==='ride'?'Ride':'Fade'} ${state.selected.name}</h3><div class="side-toggle"><button class="ride ${state.side==='ride'?'active':''}" onclick="setSide('ride')">Ride</button><button class="fade ${state.side==='fade'?'active':''}" onclick="setSide('fade')">Fade</button></div><div class="order-tabs"><button class="${state.order==='market'?'active':''}" onclick="setOrder('market')">Market</button><button class="${state.order==='limit'?'active':''}" onclick="setOrder('limit')">Limit</button></div><div class="order-line"><b>${state.order==='market'?'Best available entry':'Your limit price'}</b><span>${state.order==='market'?Math.round(price()*100)+'¢ · fills at the best available price':`Only fills at ${Math.round(state.limitPrice*100)}¢ or better`}</span></div><div class="amount-row"><div class="amount"><span>$</span><input id="amountInput" type="number" min="1" value="${state.amount}" oninput="setAmount(this.value)"></div><div class="amount ${state.order==='limit'?'':'hide-small'}"><span>¢</span><input id="limitInput" type="number" min="1" max="99" value="${Math.round(state.limitPrice*100)}" oninput="setLimit(this.value)"></div></div><div class="quick"><button onclick="setAmount(10)">$10</button><button onclick="setAmount(25)">$25</button><button onclick="setAmount(50)">$50</button><button onclick="setAmount(100)">$100</button></div><div class="summary"><div><span>Entry</span><b>${Math.round(price()*100)}¢</b></div><div><span>Est. shares</span><b>${shares().toFixed(2)}</b></div><div><span>Max return</span><b>$${maxReturn().toFixed(2)}</b></div><div><span>Max loss</span><b>$${state.amount.toFixed(2)}</b></div><div><span>Fee estimate</span><b>$${fee().toFixed(2)}</b></div></div><button class="execute" onclick="openReview()">Review ${state.side==='ride'?'ride':'fade'}</button><p class="risk-line">Price can move before confirmation. Only take risk you can afford.</p><div class="live-position ${state.positions.length?'active':''}"><b>${state.positions.length?'Position live':'No live position yet'}</b><span>${state.positions.length?state.positions[0].label:'Take a side to generate a position card.'}</span></div></aside>`}

function setOrder(o){state.order=o; renderDetail();}
function setAmount(v){state.amount=Math.max(1,+(v||1)); const a=$('amountInput'); if(a&&+a.value!==state.amount)a.value=state.amount; renderBottom(); const box=document.querySelector('.ticket .summary'); if(box) renderDetail();}

 $('boards').innerHTML=`<section class="edge-arena"><div class="arena-main"><div class="arena-content"><div class="eyebrow"><i class="dot"></i> EdgeBoards</div><h2>${active}</h2><p>${sub}</p><div class="arena-stats"><div class="arena-stat"><span>Leader</span><b>${lead[0]}</b></div><div class="arena-stat"><span>${metricLabel}</span><b>${lead[2]}</b></div><div class="arena-stat"><span>${metaLabel}</span><b>${lead[3]}</b></div><div class="arena-stat"><span>Season</span><b>Live</b></div></div></div></div><aside class="board-read"><div><div class="read-top"><span class="read-badge">Board read</span><span class="read-badge">Snapshot-ready</span></div><div class="read-card"><h3>${lead[0]}</h3><p>${lead[1]}. The gap is visible, but the chase is still open.</p></div></div><button class="primary" onclick="openCard('board')">Snapshot board</button></aside></section><div class="board-tabs"><button class="${state.board==='faders'?'active':''}" onclick="state.board='faders';renderBoards()">Top Faders</button><button class="${state.board==='riders'?'active':''}" onclick="state.board='riders';renderBoards()">Top Riders</button><button class="${state.board==='receipts'?'active':''}" onclick="state.board='receipts';renderBoards()">Best Receipts</button><button class="${state.board==='lowcap'?'active':''}" onclick="state.board='lowcap';renderBoards()">Low-Capital Signal</button><button class="${state.board==='global'?'active':''}" onclick="state.board='global';renderBoards()">Global Points</button></div><section class="elite-podium"><div class="elite-card"><div class="elite-rank"><span class="rank-chip">#2</span><span class="rank-move">↑4</span></div><div class="elite-name"><h3>${rows[1][0]}</h3><p>${rows[1][1]}</p></div><div class="elite-score">${rows[1][2]}</div><div class="elite-meta"><div><span>${metricLabel}</span><b>${rows[1][2]}</b></div><div><span>${metaLabel}</span><b>${rows[1][3]}</b></div></div></div><div class="elite-card first"><div class="elite-rank"><span class="rank-chip">#1 Dominating</span><span class="rank-move">+7 spots</span></div><div class="elite-name"><h3>${rows[0][0]}</h3><p>${rows[0][1]}</p></div><div class="elite-score">${rows[0][2]}</div><div class="elite-meta"><div><span>${metricLabel}</span><b>${rows[0][2]}</b></div><div><span>${metaLabel}</span><b>${rows[0][3]}</b></div></div></div><div class="elite-card"><div class="elite-rank"><span class="rank-chip">#3</span><span class="rank-move">↑3</span></div><div class="elite-name"><h3>${rows[2][0]}</h3><p>${rows[2][1]}</p></div><div class="elite-score">${rows[2][2]}</div><div class="elite-meta"><div><span>${metricLabel}</span><b>${rows[2][2]}</b></div><div><span>${metaLabel}</span><b>${rows[2][3]}</b></div></div></div></section><div class="leader-list elite-list">${rows.map((r,i)=>`<div class="leader-row"><div class="rank-mini">${r[4]}</div><div class="person"><b>${r[0]}</b><span>${r[1]}</span></div><div class="cell"><b>${r[2]}</b><span>${metricLabel}</span></div><div class="cell"><b>${r[3]}</b><span>${metaLabel}</span></div><div class="cell hide-mobile"><b>${i===0?'Lead':'↑'+[7,4,3,2,1][i]}</b><span>Move</span></div><div class="cell hide-mobile"><b>${r[0].includes('.id')?'.id':'wallet'}</b><span>Status</span></div></div>`).join('')}</div>`
}
function renderReceipts(){const id=state.idName?state.idName+'.id':'alice'; $('receipts').innerHTML=`<div class="section-head"><div><div class="eyebrow"><i class="dot"></i> Receipts</div><h2>Proof that moves.</h2><p>Position cards before the outcome. Receipt cards after the outcome. Shareable by design.</p></div><button class="primary" onclick="openDetail('ai-agents','fade')">Create receipt</button></div><div class="card-grid"><div class="receipt-card"><div class="rc-top"><div class="rc-logo">${logo()} NexID</div><div class="rc-kicker">Verified receipt</div></div><div class="rc-main"><h2>+48%</h2><p>${id} faded AI Agents at peak heat and moved into the Top Faders board.</p></div><div class="rc-metrics"><div class="rc-metric"><span>Rank</span><b>#3</b></div><div class="rc-metric"><span>Heat</span><b>86→52</b></div><div class="rc-metric"><span>Points</span><b>+420</b></div><div class="rc-metric"><span>Side</span><b>Fade</b></div></div></div><div class="small-stack"><div class="small-card"><h3>Live position</h3><p>${state.positions[0]?.label||'Take a side to generate a live position card.'}</p><button class="btn" onclick="openDetail('ai-agents','fade')">Open ticket</button></div><div class="small-card"><h3>${state.idName?'Referral active':'Make it yours'}</h3><p>${state.idName?'Your cards carry nexid.xyz/r/'+state.idName:'Mint .id to attach your name and referral link to every card.'}</p><button class="primary" onclick="showView('mint')">${state.idName?'View .id':'Mint .id'}</button></div></div></div>`}

/* Batch 5 — dashboard state and command center */
function ensureDashboardState(){
 if(!state.dashboardTab)state.dashboardTab='overview';
 if(typeof state.walletConnected==='undefined')state.walletConnected=localStorage.getItem('nexid_wallet_connected')==='1';
 if(!state.walletAddress)state.walletAddress=localStorage.getItem('nexid_wallet_address')||'0x8a9...f22';
 if(!state.closedPositions)state.closedPositions=[];
 if(!state.settings)state.settings={publicProfile:true,showSize:true,cardAlerts:true,weeklyDigest:false};
}
function setDashboardTab(tab){ensureDashboardState();state.dashboardTab=tab;showView('dashboard');renderDashboard();}
function connectWallet(){ensureDashboardState();state.walletConnected=true;state.walletAddress='0x8a9...f22';localStorage.setItem('nexid_wallet_connected','1');localStorage.setItem('nexid_wallet_address',state.walletAddress);toast('Wallet connected');renderDashboard();}
function disconnectWallet(){ensureDashboardState();state.walletConnected=false;localStorage.removeItem('nexid_wallet_connected');toast('Wallet disconnected');renderDashboard();}
function userInitial(){return (state.idName||'0x').slice(0,1).toUpperCase()||'N'}
function pnlFor(pos){if(!pos)return {pct:'+0%',value:'$0.00',tone:'good',now:0}; const n=narratives.find(x=>x.name===pos.n)||state.selected; const current=pos.side==='ride'?Math.min(.93,pos.entry+.08):Math.max(.08,pos.entry-.11); const pct=((current-pos.entry)/pos.entry*100*(pos.side==='ride'?1:-1)); const sign=pct>=0?'+':''; const value=(pos.amount*Math.abs(pct)/100).toFixed(2); return {pct:sign+Math.round(pct)+'%',value:(pct>=0?'+':'-')+'$'+value,tone:pct>=0?'good':'warn',now:current};}
function boardRankSummary(){return [
 {board:'Top Faders',rank:state.positions.some(p=>p.side==='fade')?'#19':'—',move:state.positions.length?'↑11':'Open',sub:'Fade a live narrative to enter'},
 {board:'Global Points',rank:'#184',move:'↑11',sub:state.points.toLocaleString()+' points'},
 {board:'Low-Capital Signal',rank:state.receipts.length?'#43':'—',move:state.receipts.length?'↑7':'Open',sub:'Receipts under $100 size'}
]}
function pendingReceiptCount(){return state.positions.filter(p=>!state.receipts.some(r=>r.positionId===p.id)).length}
function nextBestAction(){const pos=latestPosition(); if(!state.walletConnected)return {title:'Connect wallet',copy:'Connect once to place positions and keep your dashboard live.',cta:'Connect wallet',fn:'connectWallet()'}; if(!pos)return {title:'Take your first side',copy:'Open a live narrative, ride or fade it, then turn the position into a card.',cta:'Open AI Agents',fn:"openDetail('ai-agents','fade')"}; if(pendingReceiptCount())return {title:'Generate pending receipt',copy:'You have a tracked position that can become a receipt in this prototype flow.',cta:'Generate receipt',fn:`generateReceipt(${pos.id})`}; if(!state.idName)return {title:'Claim the name that carries it',copy:'Your receipts are stronger when they belong to a .id edge passport.',cta:'Mint .id',fn:"showView('mint')"}; return {title:'Push the referral loop',copy:'Your .id link is live. Share a card and let the card bring users back.',cta:'Open referrals',fn:"setDashboardTab('referrals')"}}
function dashboardShell(inner){ensureDashboardState(); const tabs=[['overview','Overview',''],['positions','Positions',String(state.positions.length)],['receipts','Receipts',String(state.receipts.length)],['boards','EdgeBoards',''],['points','Points',''],['id','.id',state.idName?'live':''],['referrals','Referrals',state.idName?'live':'locked'],['settings','Settings','']]; const walletLabel=state.walletConnected?state.walletAddress:'Not connected'; return `<div class="dashboard-command"><aside class="rail"><div class="dash-identity-card"><div class="dash-avatar">${userInitial()}</div><h2>${identityLabel()}</h2><p>${state.idName?'Your edge passport is active. Receipts, boards and referrals now carry your name.':'Your command center for positions, receipts, points and .id status.'}</p><div class="wallet-chip"><div><span>Wallet</span><b>${walletLabel}</b></div>${state.walletConnected?`<button class="btn" onclick="disconnectWallet()">Disconnect</button>`:`<button class="primary" onclick="connectWallet()">Connect</button>`}</div></div><div class="dash-nav">${tabs.map(t=>`<button class="${state.dashboardTab===t[0]?'active':''}" onclick="setDashboardTab('${t[0]}')"><span>${t[1]}</span>${t[2]?`<small>${t[2]}</small>`:''}</button>`).join('')}</div></aside><section class="dash-content">${inner}</section></div>`}
function renderDashboard(){ensureDashboardState(); const tab=state.dashboardTab||'overview'; const views={overview:dashboardOverview,positions:dashboardPositions,receipts:dashboardReceipts,boards:dashboardBoards,points:dashboardPoints,id:dashboardId,referrals:dashboardReferrals,settings:dashboardSettings}; $('dashboard').innerHTML=dashboardShell((views[tab]||dashboardOverview)());}
function dashboardOverview(){const pos=latestPosition(); const pnl=pnlFor(pos); const next=nextBestAction(); return `<section class="dash-hero"><div class="dash-hero-content"><div><div class="eyebrow"><i class="dot"></i> Private dashboard</div><h1>${pos?'Position live.':'Your edge starts here.'}</h1><p>${pos?`Your ${pos.side==='ride'?'ride':'fade'} on ${pos.n} is being tracked. Cards, receipts, points and board movement now update from this command center.`:'Take a side from any live narrative. The dashboard keeps positions, receipts, points, .id status and referrals in one place.'}</p><div class="hero-ctas"><button class="primary" onclick="${next.fn}">${next.cta}</button><button class="btn" onclick="openCard('points')">Points card</button><button class="btn" onclick="showView('boards')">Open boards</button></div></div><aside class="dash-next"><span>Next best action</span><b>${next.title}</b><p>${next.copy}</p><button class="primary" onclick="${next.fn}">${next.cta}</button></aside></div></section><div class="dash-stat-row"><div class="dash-stat"><span>Current PnL</span><b>${pos?pnl.value:'—'}</b><small>${pos?pnl.pct+' since entry':'No live position yet'}</small></div><div class="dash-stat"><span>Active positions</span><b>${state.positions.length}</b><small>${pendingReceiptCount()} pending receipt</small></div><div class="dash-stat"><span>Receipts</span><b>${state.receipts.length}</b><small>${state.idName?'.id verified ready':'mint .id to verify'}</small></div><div class="dash-stat"><span>Edge Points</span><b>${state.points.toLocaleString()}</b><small>Season rank #184</small></div><div class="dash-stat"><span>.id status</span><b>${state.idName?'Live':'Open'}</b><small>${state.idName?state.idName+'.id':'not minted'}</small></div></div><div class="dash-two-col"><div class="dash-panel"><div class="dash-panel-head"><div><h2>Active now</h2><p>Live positions and pending receipts.</p></div><button class="btn" onclick="setDashboardTab('positions')">View all</button></div>${pos?positionRow(pos,true):emptyDash('No active position yet','Open a narrative and take a side. Your first position card appears here.',"openDetail('ai-agents','fade')",'Take a side')}</div><aside class="dash-panel"><div class="dash-panel-head"><div><h2>Board movement</h2><p>Your current rank signals.</p></div></div>${boardRankSummary().map(b=>`<div class="position-row"><div class="position-main"><b>${b.board}</b><span>${b.sub}</span><div class="position-meta"><span class="meta-pill warn">${b.rank}</span><span class="meta-pill good">${b.move}</span></div></div><button class="btn" onclick="showView('boards')">Open</button></div>`).join('')}</aside></div>`}
function emptyDash(title,copy,fn,label){return `<div class="empty-state"><h3>${title}</h3><p>${copy}</p><button class="primary" onclick="${fn}">${label}</button></div>`}
function positionRow(p,featured=false){const pnl=pnlFor(p); return `<div class="position-row"><div class="position-main"><b>${p.side==='ride'?'Riding':'Fading'} ${p.n}</b><span>Entry ${Math.round(p.entry*100)}¢ · current ${Math.round(pnl.now*100)}¢ · ${p.proof||'Tracked'}</span><div class="position-meta"><span class="meta-pill ${pnl.tone}">${pnl.value}</span><span class="meta-pill">${pnl.pct}</span><span class="meta-pill warn">${p.heat} heat at entry</span><span class="meta-pill">$${p.amount} size</span></div></div><div class="position-actions"><button class="btn" onclick="openCard('position',state.positions.find(x=>x.id===${p.id}))">Position card</button><button class="primary" onclick="generateReceipt(${p.id})">${state.receipts.some(r=>r.positionId===p.id)?'Receipt':'Generate receipt'}</button></div></div>`}
function dashboardPositions(){const active=state.positions; const closed=state.receipts.map(r=>({id:r.positionId,n:r.narrative,side:r.side,amount:state.positions.find(p=>p.id===r.positionId)?.amount||25,entry:state.positions.find(p=>p.id===r.positionId)?.entry||.62,heat:parseInt(String(r.heatMove).split('→')[0])||86,proof:r.proof,receipt:r})); return `<div class="dash-panel"><div class="dash-panel-head"><div><h2>Positions</h2><p>Live positions, closed positions and receipt eligibility.</p></div><button class="primary" onclick="openDetail('ai-agents','fade')">Take a side</button></div>${active.length?active.map(p=>positionRow(p)).join(''):emptyDash('No live positions','Pick a narrative, ride or fade it, then come back here to track it.',"openDetail('ai-agents','fade')",'Open live narratives')}</div><div class="dash-panel"><div class="dash-panel-head"><div><h2>Closed / receipted</h2><p>Positions that already produced receipts.</p></div></div>${closed.length?closed.map(p=>`<div class="position-row"><div class="position-main"><b>${p.receipt.result} · ${p.n}</b><span>${p.receipt.proof} · ${p.receipt.url}</span><div class="position-meta"><span class="meta-pill good">${p.receipt.points} pts</span><span class="meta-pill">${p.side}</span></div></div><button class="btn" onclick="openCard('receipt',state.receipts.find(x=>x.id==='${p.receipt.id}'))">Receipt</button></div>`).join(''):emptyDash('No closed positions yet','Receipts appear here after a position closes, resolves, or is generated in prototype mode.',"setDashboardTab('positions')",'Stay here')}</div>`}

function renderBottom(){const bar=$('bottomTicket'); if(!bar)return; if(state.view!=='detail'){bar.classList.remove('show');bar.innerHTML='';return} bar.classList.add('show'); bar.innerHTML=`<div class="bt-name"><b>${state.selected.name}</b><span>${state.selected.heat} heat · ${fmt(state.selected.liq)} liquidity</span></div><div class="bt-sides"><button class="ride ${state.side==='ride'?'active':''}" onclick="setSideBottom('ride')">Ride</button><button class="fade ${state.side==='fade'?'active':''}" onclick="setSideBottom('fade')">Fade</button></div><div class="bt-amount"><span>$</span><input type="number" value="${state.amount}" oninput="setAmount(this.value)"></div><button class="primary" onclick="openReview()">Review ${state.side}</button>`}
function cleanName(v){return (v||'').toLowerCase().replace(/[^a-z0-9-]/g,'').slice(0,24)}

function referralLink(name=state.idName){return `nexid.xyz/r/${name||'yourname'}`}
function saveIdentityState(){localStorage.setItem('nexid_primary_id',state.idName||'');localStorage.setItem('nexid_minted_names',JSON.stringify(state.mintedNames||[]));localStorage.setItem('nexid_referral_stats',JSON.stringify(state.referralStats||{}));localStorage.setItem('nexid_referral_events',JSON.stringify(state.referralEvents||[]));localStorage.setItem('nexid_points',state.points)}
function referralStats(){if(!state.referralStats)state.referralStats={clicks:0,signups:0,mints:0,pending:0,paid:0,copied:0,shared:0};return state.referralStats}
function referralEvent(title,sub,amount){state.referralEvents=state.referralEvents||[];state.referralEvents.unshift({title,sub,amount,time:new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})});state.referralEvents=state.referralEvents.slice(0,6);saveIdentityState()}
function copyReferral(){if(!state.idName){toast('Mint .id to unlock referrals');return} const link=referralLink(); navigator.clipboard?.writeText(link); const r=referralStats(); r.copied=(r.copied||0)+1; saveIdentityState(); toast('Referral link copied'); renderDashboard(false)}
function shareReferral(){if(!state.idName){toast('Mint .id to unlock referrals');return} const link='https://'+referralLink(); const r=referralStats(); r.shared=(r.shared||0)+1; saveIdentityState(); if(navigator.share){navigator.share({title:`${state.idName}.id on NexID`,text:'Trade the timeline. Prove your edge.',url:link}).catch(()=>{});} else {navigator.clipboard?.writeText(link); toast('Referral link copied')} renderDashboard(false)}
function previewReferralMint(price=25){if(!state.idName)return;const r=referralStats();const earn=+(price*.25).toFixed(2);r.clicks+=7;r.signups+=1;r.mints+=1;r.pending=+(r.pending+earn).toFixed(2);referralEvent('Referred .id mint',`Someone minted through ${state.idName}.id`,'+$'+earn.toFixed(2));saveIdentityState();toast('Referral mint tracked · $'+earn.toFixed(2)+' pending');renderDashboard(false);renderMint()}
function markReferralPaid(){const r=referralStats(); if(!r.pending){toast('No pending earnings');return} r.paid=+(r.paid+r.pending).toFixed(2); referralEvent('Referral payout','Pending referral earnings moved to paid','$'+r.pending.toFixed(2)); r.pending=0; saveIdentityState(); toast('Referral payout marked paid'); renderDashboard(false)}
function cleanName(v){return (v||'').toLowerCase().replace(/[^a-z0-9-]/g,'').slice(0,24)}
function pricingForLength(l){if(l===1)return {price:250,rarity:'Ultra',desc:'The rarest edge identity. Built for collectors, whales and top-board names.'}; if(l===2)return {price:120,rarity:'Rare',desc:'Short, scarce and easy to flex across cards, boards and receipts.'}; if(l===3)return {price:60,rarity:'Premium',desc:'A premium short name for a profile people can remember.'}; if(l===4)return {price:25,rarity:'Scarce',desc:'A clean, scarce name for your edge profile and referral trail.'}; return {price:5,rarity:'Standard',desc:'The simplest way to make receipts, referrals and rank portable.'}}
function nameMeta(v){
 const name=cleanName(v); const l=name.length;
 if(!l) return {label:'',name:'',price:0,rarity:'',available:false,status:'idle',desc:'Pick the .id that will carry your receipts, board identity and referral trail.'};
 if(name.length<1)return {label:name+'.id',name,price:0,rarity:'',available:false,status:'bad',desc:'Enter at least one character.'};
 const reserved=['admin','nexid','support','root','bankr','polymarket','wallet','edgeboard'];
 if(reserved.includes(name)) return {label:name+'.id',name,price:0,rarity:'Reserved',available:false,status:'bad',desc:'This name is reserved.'};
 if((state.mintedNames||[]).includes(name)) return {label:name+'.id',name,price:0,rarity:'Owned',available:false,status:'owned',desc:'This .id is already owned in your account.'};
 const tier=pricingForLength(l);
 return {label:name+'.id',name,price:tier.price,rarity:tier.rarity,available:true,status:'ok',desc:tier.desc};
}
function activeReservationLabel(){if(!state.reservation)return '10:00'; const ms=Math.max(0,state.reservation.expiresAt-Date.now()); const m=Math.floor(ms/60000); const sec=String(Math.floor((ms%60000)/1000)).padStart(2,'0'); return `${m}:${sec}`}
function renderMint(){
 ensureDashboardState();
 const active=state.idName;
 const draft=cleanName(state.mintDraft||'');
 const m=nameMeta(draft);
 const stage=state.mintStage||'search';
 if(active && !state.mintingAnother){$('mint').innerHTML=mintedActiveView(active);return;}
 $('mint').innerHTML=`<div class="mint-elite">
  ${mintPassportPreview(m,draft)}
  <section class="mint-console"><div class="mint-console-inner">
   <div class="eyebrow"><i class="dot"></i> Mint .id</div>
   <h2>${state.mintingAnother?'Mint another .id':'Own the name that carries your edge'}</h2>
   <p class="lead">A .id is your portable edge passport — the name that carries your receipts, board identity, referral link and future NexID access.</p>
   ${ownedNamesBlock()}
   ${state.mintingAnother&&active?`<div class="mint-current-note"><span>Primary passport</span><b>${active}.id</b></div>`:''}
   ${mintProgress(stage)}
   ${stage==='pay'?mintPayStage(m):stage==='activating'?mintActivatingStage(m):mintSearchStage(m,draft)}
  </div></section>
 </div>`;
}
function ownedNamesBlock(){const names=state.mintedNames||[]; if(!names.length)return ''; return `<div class="owned-names"><span>Owned .id names</span><div class="owned-grid">${names.map(n=>`<button class="owned-chip ${state.idName===n?'primary-id':''}" onclick="setPrimaryId('${n}')">${n}.id ${state.idName===n?'<small>Primary</small>':'<small>Use</small>'}</button>`).join('')}</div></div>`}
function setPrimaryId(n){if(!(state.mintedNames||[]).includes(n))return;state.idName=n;saveIdentityState();toast(`${n}.id set as primary`);renderMint();renderDashboard(false);renderBottom()}
function mintProgress(stage){const order=['Name','Reserve','Pay','Active'];const index=stage==='search'?0:stage==='pay'?2:stage==='activating'?2:3;return `<div class="mint-progress">${order.map((x,i)=>`<div class="mint-step ${i<=index?'active':''}">${x}</div>`).join('')}</div>`}
function mintTierKey(len){return len===1?'1':len===2?'2':len===3?'3':len===4?'4':len>=5?'5+':''}
function mintTierCards(key){const tiers=[['1','Ultra','$250'],['2','Rare','$120'],['3','Premium','$60'],['4','Scarce','$25'],['5+','Standard','$5']];return `<div class="mint-tier-row">${tiers.map(t=>`<div class="mint-tier-card ${key===t[0]?'active':''}"><b>${t[0]}</b><span>${t[1]} · ${t[2]}</span></div>`).join('')}</div>`}
function mintPassportPreview(m,draft){const clean=draft||'';const display=m.label||'yourname.id';const ref=clean?referralLink(clean):'nexid.xyz/r/yourname';return `<aside class="mint-passport-card">

 <div class="mint-passport-body"><h2 class="mint-name-preview">${display.replace('.id','<span class="muted-dot">.id</span>')}</h2><p>${m.label?m.desc:'Receipts, ranks and referrals become easier to carry when they have a name.'}</p><div class="mint-proof-strip"><div class="mint-proof"><span>Receipts</span><b>Verified</b></div><div class="mint-proof"><span>Boards</span><b>Official</b></div><div class="mint-proof"><span>Referral</span><b>25%</b></div></div></div>
 <div class="mint-passport-bottom"><div class="mint-ref-preview"><div><span>Card footer</span><b>${ref}</b></div><strong>${m.price?'$'+m.price:'—'}</strong></div></div>
 </aside>`}
function mintSearchStage(m,draft){const key=mintTierKey(draft.length);const status=!m.label?'idle':m.available?'ok':'bad';const statusText=!m.label?'Search open':m.available?'Available':'Unavailable';return `<div class="mint-name-field"><input id="mintName" placeholder="alice" value="${draft}" autocomplete="off" spellcheck="false" oninput="previewName(this.value)"><span>.id</span></div>
 ${mintTierCards(key)}
 <div class="mint-live-price"><div><h3>${m.label||'Claim your edge passport'}</h3><p>${m.label?m.desc:'Search a name. Price moves with rarity. Ownership unlocks verified cards, referrals and future access.'}</p></div><div class="price">${m.price?'$'+m.price:'—'}${m.price?'<small> USD</small>':''}</div></div>
 <div class="mint-availability"><div><b>${statusText}</b><span>${m.available?'Available now. Reserve it to continue.':m.label?m.desc:'Your .id is not reputation by itself. It claims the reputation you earn.'}</span></div><span class="status-pill ${status}">${statusText}</span></div>
 <div class="mint-primary-row"><button class="primary" ${m.available?'':'disabled'} onclick="beginOwn()">${m.available?'Proceed to own '+m.label:'Proceed when available'}</button><button class="btn" onclick="showView('boards')">View EdgeBoards</button></div>`}
function mintPayStage(m){if(!m.available && state.reservation?.name!==m.name)return mintSearchStage(m,cleanName(state.mintDraft||'')); const remaining=activeReservationLabel();return `<div class="mint-checkout"><div class="mint-reservation"><div><span>Reservation</span><b>${m.label}</b></div><div><span>Expires</span><b>${remaining}</b></div></div><div class="mint-order-card"><div class="mint-order-top"><div><h3>${m.label}</h3><p>${m.rarity} · ${state.reservation?.id||'reserved'}</p></div><div class="mint-total">$${m.price}</div></div><div class="mint-summary-lines"><div class="mint-line"><span>Name</span><b>${m.label}</b></div><div class="mint-line"><span>Unlocks</span><b>Profile · Cards · Referrals</b></div><div class="mint-line"><span>Referral</span><b>25% link after activation</b></div><div class="mint-line"><span>Edge Points</span><b>+750 after activation</b></div></div></div>${!state.walletConnected?`<div class="wallet-note"><b>Wallet required.</b> Connect once to pay and bind this .id to your Edge profile.</div>`:''}<div class="payment-title"><h3>Select how to pay</h3><span>Confirm once. Activate immediately after payment.</span></div><div class="pay-grid elite"><button class="pay-card elite ${state.payMethod==='USDC'?'active':''}" onclick="selectPay('USDC')"><b>USDC</b><span>Wallet payment</span></button><button class="pay-card elite ${state.payMethod==='USDT'?'active':''}" onclick="selectPay('USDT')"><b>USDT</b><span>Stable payment</span></button><button class="pay-card elite ${state.payMethod==='Wallet'?'active':''}" onclick="selectPay('Wallet')"><b>Wallet</b><span>Use available balance</span></button></div><div class="mint-primary-row">${state.walletConnected?`<button class="primary" onclick="confirmMint()">Confirm in wallet</button>`:`<button class="primary" onclick="connectWallet();renderMint()">Connect wallet</button>`}<button class="btn" onclick="state.mintStage='search';state.reservation=null;renderMint()">Change name</button></div></div>`}
function mintActivatingStage(m){return `<div class="mint-activating"><div><div class="activation-orb"></div><h3>Activating ${m.label}</h3><p>Payment received. Binding the name to your Edge profile and preparing your referral link.</p><div class="activation-steps"><span>Name reserved</span><span>${state.payMethod} confirmed</span><span>Updating cards and boards</span></div></div></div>`}
function mintedActiveView(active){const names=state.mintedNames||[];const r=referralStats();return `<div class="mint-elite minted-mode"><aside class="mint-passport-card"><div class="mint-passport-top"><div class="rc-logo">${logo()} NexID</div><span class="mint-passport-tag">Active</span></div><div class="mint-passport-body"><h2 class="mint-name-preview">${active}<span class="muted-dot">.id</span></h2><p>Your edge passport is live. Receipts, board identity and referral trail now carry this name.</p><div class="mint-proof-strip"><div class="mint-proof"><span>Status</span><b>Verified</b></div><div class="mint-proof"><span>Points</span><b>+750</b></div><div class="mint-proof"><span>Referral</span><b>25%</b></div></div></div><div class="mint-passport-bottom"><div class="mint-ref-preview"><div><span>Referral link</span><b>${referralLink(active)}</b></div><strong>Live</strong></div></div></aside><section class="minted-success"><div class="rc-logo">${logo()} NexID</div><h2>${active}.id is yours.</h2><p>Your portable edge passport is active — receipts, official boards, referral earnings and future NexID access now have a name.</p><div class="ref-link-box"><code>${referralLink(active)}</code><button onclick="copyReferral()">Copy</button><button onclick="shareReferral()">Share</button></div><div class="mint-reward-grid"><div class="mint-reward"><span>Cards</span><b>${active}.id appears on receipts</b></div><div class="mint-reward"><span>Boards</span><b>Official identity active</b></div><div class="mint-reward"><span>Referrals</span><b>$${r.pending.toFixed(2)} pending · $${r.paid.toFixed(2)} paid</b></div></div>${names.length>1?`<div class="owned-names"><span>Owned names</span><div class="owned-grid">${names.map(n=>`<button class="owned-chip ${n===active?'primary-id':''}" onclick="setPrimaryId('${n}')">${n}.id ${n===active?'<small>Primary</small>':'<small>Use</small>'}</button>`).join('')}</div></div>`:''}<div class="hero-ctas" style="margin-top:22px"><button class="primary" onclick="showView('dashboard');setDashboardTab('referrals')">Open referrals</button><button class="btn" onclick="openCard('passport')">Passport card</button><button class="btn" onclick="startMintAnother()">Mint another .id</button></div></section></div>`}
function previewName(v){state.mintDraft=cleanName(v);state.mintStage='search';state.reservation=null;renderMint();setTimeout(()=>{const input=$('mintName');if(input){input.focus();const len=input.value.length;input.setSelectionRange(len,len)}},0)}
function startMintAnother(){state.mintingAnother=true;state.mintDraft='';state.mintStage='search';state.reservation=null;renderMint();setTimeout(()=>{$('mintName')?.focus()},0)}
function beginOwn(){const v=cleanName(state.mintDraft||$('mintName')?.value); const meta=nameMeta(v); if(!meta.available){toast(meta.status==='owned'?'You already own this .id':'Choose an available name');return} state.mintDraft=v; state.reservation={id:'res_'+Math.random().toString(36).slice(2,8),name:v,label:meta.label,price:meta.price,createdAt:Date.now(),expiresAt:Date.now()+10*60*1000}; state.mintStage='pay'; renderMint(); toast(meta.label+' reserved')}
function selectPay(p){state.payMethod=p;renderMint()}
function checkMint(){beginOwn()}
function reserveMint(){beginOwn()}
function confirmMint(){ensureDashboardState();const v=cleanName(state.mintDraft||$('mintName')?.value||'alice'); const meta=nameMeta(v); if(!meta.available && !(state.reservation&&state.reservation.name===v)){toast('Choose an available name');return} if(!state.walletConnected){toast('Connect wallet first');renderMint();return} state.mintStage='activating'; renderMint(); toast('Confirming '+state.payMethod+' payment'); clearTimeout(window.__mintTimer); window.__mintTimer=setTimeout(()=>{state.idName=v; state.mintedNames=Array.from(new Set([...(state.mintedNames||[]),v])); state.mintingAnother=false; state.points+=750; state.mintStage='success'; state.reservation=null; referralEvent('.id activated',`${v}.id referral link is live`,'+750 pts'); saveIdentityState(); toast(`${v}.id is live · referrals unlocked`); renderMint(); renderDashboard(false); renderBottom(); renderHome(); renderReceipts(); setTimeout(()=>openCard('passport'),180);},2300)}
function setSideBottom(s){state.side=s; state.limitPrice=s==='ride'?state.selected.ridePrice:state.selected.fadePrice; if(state.view==='detail')renderDetail(); else renderBottom();}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove('show'),2200)}
function init(){if(!state.idName && (state.mintedNames||[]).length)state.idName=state.mintedNames[0];setThemeFromDevice();renderHome();renderNarratives();renderBoards();renderReceipts();renderPoints();renderMint();renderDashboard(false);renderLegal();renderBottom();}
window.addEventListener('keydown',e=>{if(e.key==='Escape'){closeReview();closeCardModal();}});
init();
</script>
</body>
